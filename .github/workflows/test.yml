name: 'build-test'

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  pull_request:
    types: [ opened, synchronize, reopened ]  # Same as default
    paths-ignore:
      - '**.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm run all

      - name: Run octocov
        uses: k1LoW/octocov-action@b3b6ee60482a667950f87553abf1df63217235d9 # v1

  test:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Test this action
        uses: ./
        with:
          project-path: UnityProject~
          active-input-handler: 0
        id: test

      - name: Verify output
        run: test "${{ steps.test.outputs.created-project-path }}" = "UnityProject~"

      - name: Verify export environment variable
        run: test "${{ env.CREATED_PROJECT_PATH }}" = "UnityProject~"

      - name: Verify created project
        run: |
          ls -la "${{ steps.test.outputs.created-project-path }}"

      - name: Verify activeInputHandler
        run: |
          PROJECT_SETTINGS_PATH="${{ steps.test.outputs.created-project-path }}/ProjectSettings/ProjectSettings.asset"
          test -f "$PROJECT_SETTINGS_PATH"
          grep -q "activeInputHandler: 0" "$PROJECT_SETTINGS_PATH"

  test-project-path-is-workspace-root:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Test this action
        uses: ./
        with:
          project-path: .
          active-input-handler: 2
        id: test

      - name: Verify output
        run: test "${{ steps.test.outputs.created-project-path }}" = "."

      - name: Verify export environment variable
        run: test "${{ env.CREATED_PROJECT_PATH }}" = "."

      - name: Verify created project
        run: |
          ls -la "${{ steps.test.outputs.created-project-path }}"

      - name: Verify activeInputHandler
        run: |
          PROJECT_SETTINGS_PATH="ProjectSettings/ProjectSettings.asset"
          test -f "$PROJECT_SETTINGS_PATH"
          grep -q "activeInputHandler: 2" "$PROJECT_SETTINGS_PATH"

  notify:
    needs: [ build, test ]
    if: failure() && github.event.pull_request.head.repo.fork == false # Skip on public fork, because can not read secrets.
    runs-on: ubuntu-slim
    timeout-minutes: 5
    permissions:
      actions: read

    steps:
      - uses: Gamesight/slack-workflow-status@68bf00d0dbdbcb206c278399aa1ef6c14f74347a # v1.3.0
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
