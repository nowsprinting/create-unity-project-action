name: 'Create Unity Project'
description: 'Create empty Unity3D project'
author: 'nowsprinting'

inputs:
  project-path:
    description: 'Path of the Unity project to be created, relative from repository root (/github/workspace).'
    required: false
    default: 'UnityProject~'
  active-input-handler:
    description: 'Active Input Handler setting for the Unity project. 0: "Input Manager (Old)" (default), 1: "Input System Package (New)", and 2: "Both".'
    required: false
    default: '0'
  scripting-backend:
    description: 'Scripting Backend setting for the Unity project. 0: "Mono" (default), 1: "IL2CPP".'
    required: false
    default: '0'
  il2cpp-code-generation:
    description: 'IL2CPP Code Generation setting for the Unity project. 0: "Optimize for runtime speed" (default), 1: "Optimize for code size and build time".'
    required: false
    default: '0'
  managed-stripping-level:
    description: 'Managed Stripping Level setting for the Unity project. 4: "Minimal" (default), 1: "Low", 2: "Medium", 3: "High".'
    required: false
    default: '4'

outputs:
  created-project-path:
    description: 'Path of the created Unity project, relative from repository root (/github/workspace).'

runs:
  using: 'node24'
  main: 'dist/index.js'

branding:
  icon: 'package'
  color: 'gray-dark'